<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chess Annotator</title>
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <div class="app">
      <header class="action-bar">
        <div class="title-block">
          <h1>Chess Annotator</h1>
          <div class="document-meta" id="document-meta">No PGN loaded</div>
        </div>
        <div class="actions">
          <label class="game-picker">
            <span>Game</span>
            <select id="game-select" disabled>
              <option>No games loaded</option>
            </select>
          </label>
          <button type="button" id="open-button">Open</button>
          <button type="button" id="save-button" disabled>Save</button>
          <button type="button" id="close-button">Close</button>
        </div>
      </header>
      <input id="open-file-input" type="file" accept=".pgn" hidden>

      <main class="workspace">
        <section class="left-pane">
          <div class="pane-title">Board</div>
          <div class="board-pane" id="board-pane">
            <div class="board-placeholder">Board SVG will render here.</div>
          </div>
        </section>

        <div class="splitter splitter-vertical" id="main-splitter" role="separator" aria-orientation="vertical" aria-label="Resize board and annotation panes"></div>

        <section class="right-pane">
          <div class="top-pane">
            <div class="pane-title">Moves</div>
            <div class="moves-pane" id="moves-pane">
              <div class="moves-placeholder">Move list will render here.</div>
            </div>
            <div class="transport-controls">
              <button type="button" class="nav-button" data-action="start" disabled>&lt;&lt;</button>
              <button type="button" class="nav-button" data-action="prev" disabled>&lt;</button>
              <button type="button" class="nav-button" data-action="next" disabled>&gt;</button>
              <button type="button" class="nav-button" data-action="end" disabled>&gt;&gt;</button>
            </div>
          </div>
          <div class="splitter splitter-horizontal" id="right-splitter" role="separator" aria-orientation="horizontal" aria-label="Resize move list and annotation panes"></div>
          <div class="bottom-pane">
            <div class="pane-title">Annotation</div>
            <label class="checkbox-row">
              <input type="checkbox" id="diagram-checkbox" disabled>
              Diagram follows
            </label>
            <textarea id="comment-editor" rows="10" disabled placeholder="Comment editor will render here."></textarea>
            <div class="editor-actions">
              <button type="button" id="clear-comments-button" disabled>Clear Comments</button>
              <button type="button" id="apply-button" disabled>Apply</button>
              <button type="button" id="cancel-button" disabled>Cancel</button>
            </div>
          </div>
        </section>
      </main>

      <footer class="status-bar" id="status-bar">Loading session…</footer>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
