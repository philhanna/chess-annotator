openapi: 3.1.0
info:
  title: Chess Annotator API
  version: 1.0.1
  description: |
    REST API served by `chess-server` (or auto-launched in a background thread
    by `chess-annotate`). All state lives on the server; the CLI and any future
    browser client communicate exclusively through these endpoints.

    **Session model** — a session is represented by the presence of `.work`
    files for a game. `POST /games/{game_id}/session` opens or resumes one.
    `DELETE /games/{game_id}/session` closes it.

    **Segment identity** — segments are keyed by `turning_point_ply`, not by
    1-based index. The ply is stable for the lifetime of a segment; indices
    shift whenever a split or merge occurs.

    **Error shape** — all error responses use FastAPI's default body:
    `{ "detail": "<message>" }`. The close-session 409 uses an object detail:
    `{ "detail": { "requires_confirmation": true } }`.
servers:
  - url: http://127.0.0.1:8765
    description: Default local server

tags:
  - name: Health
  - name: Games
  - name: Sessions
  - name: Segments
  - name: Output

paths:

  /health:
    get:
      tags: [Health]
      summary: Server health check
      operationId: healthCheck
      responses:
        '200':
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok

  /games:
    get:
      tags: [Games]
      summary: List all games
      operationId: listGames
      responses:
        '200':
          description: All games in the store, sorted by game_id
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GameSummary'
    post:
      tags: [Games]
      summary: Import a game and open a session
      operationId: importGame
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportGameRequest'
      responses:
        '201':
          description: Game imported and session opened
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameState'
        '409':
          description: game_id already exists and overwrite was not set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '422':
          description: PGN could not be parsed or other validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /games/{game_id}:
    parameters:
      - $ref: '#/components/parameters/GameId'
    delete:
      tags: [Games]
      summary: Permanently delete a game and all its files
      operationId: deleteGame
      responses:
        '204':
          description: Game deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /games/{game_id}/copy:
    parameters:
      - $ref: '#/components/parameters/GameId'
    post:
      tags: [Games]
      summary: Copy a game to a new game_id
      operationId: copyGame
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CopyGameRequest'
      responses:
        '204':
          description: Game copied
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: new_game_id already exists and overwrite was not set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /games/{game_id}/session:
    parameters:
      - $ref: '#/components/parameters/GameId'
    post:
      tags: [Sessions]
      summary: Open or resume a session
      operationId: openSession
      responses:
        '200':
          description: Session opened (or resumed from an existing working copy)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameState'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    get:
      tags: [Sessions]
      summary: Get the current session state
      operationId: getSession
      responses:
        '200':
          description: Current session state including segment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameState'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      tags: [Sessions]
      summary: Close a session
      description: |
        Omit `save_changes` to detect unsaved changes without committing.
        If unsaved changes exist the server returns `409` with
        `{ "detail": { "requires_confirmation": true } }`.
        Re-send with `save_changes=true` to commit or `save_changes=false`
        to discard.
      operationId: closeSession
      parameters:
        - name: save_changes
          in: query
          required: false
          schema:
            type: boolean
          description: |
            `true` — save then close.
            `false` — discard then close.
            Omit — close only if no unsaved changes; otherwise return 409.
      responses:
        '200':
          description: Session closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloseGameResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Unsaved changes exist and `save_changes` was not provided.
            Body: `{ "detail": { "requires_confirmation": true } }`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /games/{game_id}/session/save:
    parameters:
      - $ref: '#/components/parameters/GameId'
    post:
      tags: [Sessions]
      summary: Save (commit working copy to canonical files)
      operationId: saveSession
      responses:
        '200':
          description: Working copy committed; session remains open
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameState'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/SessionNotOpen'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /games/{game_id}/session/segments:
    parameters:
      - $ref: '#/components/parameters/GameId'
    get:
      tags: [Segments]
      summary: List segments in the open session
      operationId: listSegments
      responses:
        '200':
          description: Segments in order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SegmentSummary'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/SessionNotOpen'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    post:
      tags: [Segments]
      summary: Add a turning point (split a segment)
      operationId: addTurningPoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTurningPointRequest'
      responses:
        '200':
          description: Updated segment list after the split
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SegmentSummary'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/SessionNotOpen'
        '422':
          description: ply is out of range or already a turning point
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /games/{game_id}/session/segments/merge:
    parameters:
      - $ref: '#/components/parameters/GameId'
    post:
      tags: [Segments]
      summary: Merge a range of segments
      description: |
        Collapses segments `m` through `n` (1-based indices) into one.
        Labels are space-joined; annotations are blank-line-joined.
      operationId: mergeSegments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MergeSegmentsRequest'
      responses:
        '200':
          description: Updated segment list after the merge
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SegmentSummary'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/SessionNotOpen'
        '422':
          description: m or n out of range, or m >= n
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /games/{game_id}/session/segments/{ply}:
    parameters:
      - $ref: '#/components/parameters/GameId'
      - $ref: '#/components/parameters/Ply'
    get:
      tags: [Segments]
      summary: View a single segment
      operationId: getSegment
      responses:
        '200':
          description: Full segment detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SegmentDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/SessionNotOpen'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    patch:
      tags: [Segments]
      summary: Update a segment's label and/or annotation
      description: |
        Both fields are optional; omitting one leaves it unchanged.
        At least one field should be provided (sending neither is a no-op
        that returns the current segment detail).
      operationId: patchSegment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchSegmentRequest'
      responses:
        '200':
          description: Updated segment detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SegmentDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/SessionNotOpen'
        '422':
          description: label or annotation is blank
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
    delete:
      tags: [Segments]
      summary: Remove a turning point (merge segment into predecessor)
      description: |
        The segment's label and annotation are discarded. If the segment has
        any authored content and `force` is not set, the server returns 422.
      operationId: removeTurningPoint
      parameters:
        - name: force
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Discard content without error even if segment is non-empty.
      responses:
        '200':
          description: Updated segment list after the merge
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SegmentSummary'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/SessionNotOpen'
        '422':
          description: Segment has content and force was not set, or ply is not a turning point
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /games/{game_id}/render:
    parameters:
      - $ref: '#/components/parameters/GameId'
    post:
      tags: [Output]
      summary: Render the game annotation to PDF
      description: |
        Uses the working copy when a session is open, otherwise the canonical
        files. Returns the PDF bytes directly so a browser client can open the
        print dialog without needing access to the server filesystem.
      operationId: renderPdf
      responses:
        '200':
          description: PDF bytes
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: A segment is missing a label or annotation text
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '501':
          $ref: '#/components/responses/NotImplemented'

  /games/{game_id}/lichess:
    parameters:
      - $ref: '#/components/parameters/GameId'
    post:
      tags: [Output]
      summary: Upload game PGN to Lichess
      description: |
        Uses the working copy when a session is open, otherwise the canonical
        files. Returns the Lichess analysis URL.
      operationId: uploadToLichess
      responses:
        '200':
          description: Lichess analysis URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LichessResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '501':
          $ref: '#/components/responses/NotImplemented'

components:

  parameters:
    GameId:
      name: game_id
      in: path
      required: true
      description: Author-supplied game identifier
      schema:
        type: string
        minLength: 1
    Ply:
      name: ply
      in: path
      required: true
      description: Turning-point ply number that identifies the segment
      schema:
        type: integer
        minimum: 1

  responses:
    NotFound:
      description: Game or segment not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'
    SessionNotOpen:
      description: No open session (working copy) exists for the game
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'
    UnprocessableEntity:
      description: Request is structurally valid but cannot be processed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'
    NotImplemented:
      description: Required optional adapter (renderer or Lichess uploader) not configured
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'

  schemas:

    ErrorDetail:
      type: object
      required: [detail]
      properties:
        detail:
          oneOf:
            - type: string
              description: Human-readable error message
            - type: object
              description: Structured error (e.g. requires_confirmation)
              properties:
                requires_confirmation:
                  type: boolean

    GameSummary:
      type: object
      required: [game_id, title, white, black, event, date, result, in_progress]
      properties:
        game_id:
          type: string
        title:
          type: string
        white:
          type: string
        black:
          type: string
        event:
          type: string
        date:
          type: string
        result:
          type: string
        in_progress:
          type: boolean
          description: True when a working copy (open session) exists for this game

    GameState:
      type: object
      required: [game_id, title, session_open, has_unsaved_changes, segments, resumed]
      properties:
        game_id:
          type: string
        title:
          type: string
        session_open:
          type: boolean
        has_unsaved_changes:
          type: boolean
        resumed:
          type: boolean
          description: True when open_game found an existing working copy rather than creating a fresh one
        segments:
          type: array
          items:
            $ref: '#/components/schemas/SegmentSummary'

    SegmentSummary:
      type: object
      required: [turning_point_ply, start_ply, end_ply, move_range, label, has_annotation]
      properties:
        turning_point_ply:
          type: integer
          minimum: 1
        start_ply:
          type: integer
          minimum: 1
        end_ply:
          type: integer
          minimum: 1
        move_range:
          type: string
          description: Human-readable move span, e.g. `1. e4 to 10...Nc6`
        label:
          type: string
        has_annotation:
          type: boolean

    SegmentDetail:
      type: object
      required: [turning_point_ply, start_ply, end_ply, move_range, label, annotation, move_list]
      properties:
        turning_point_ply:
          type: integer
          minimum: 1
        start_ply:
          type: integer
          minimum: 1
        end_ply:
          type: integer
          minimum: 1
        move_range:
          type: string
        label:
          type: string
        annotation:
          type: string
        move_list:
          type: string
          description: Complete SAN move sequence for this segment's ply range

    CloseGameResult:
      type: object
      required: [game_id, closed, requires_confirmation]
      properties:
        game_id:
          type: string
        closed:
          type: boolean
        requires_confirmation:
          type: boolean
        saved:
          type: boolean
        discarded:
          type: boolean

    ImportGameRequest:
      type: object
      required: [game_id, pgn_text, player_side]
      properties:
        game_id:
          type: string
          minLength: 1
        pgn_text:
          type: string
          minLength: 1
          description: Raw PGN content (may contain multiple games; use game_index to select)
        player_side:
          type: string
          enum: [white, black]
        author:
          type: string
          default: ""
        date:
          type: string
          description: Overrides the PGN Date header; defaults to the PGN value when omitted
        game_index:
          type: integer
          minimum: 0
          default: 0
          description: 0-based index of the game to import from a multi-game PGN
        overwrite:
          type: boolean
          default: false

    CopyGameRequest:
      type: object
      required: [new_game_id]
      properties:
        new_game_id:
          type: string
          minLength: 1
        overwrite:
          type: boolean
          default: false

    AddTurningPointRequest:
      type: object
      required: [ply]
      properties:
        ply:
          type: integer
          minimum: 1
        label:
          type: string
          default: ""

    MergeSegmentsRequest:
      type: object
      required: [m, n]
      properties:
        m:
          type: integer
          minimum: 1
          description: 1-based index of the first segment to merge
        n:
          type: integer
          minimum: 1
          description: 1-based index of the last segment to merge (must be > m)

    PatchSegmentRequest:
      type: object
      properties:
        label:
          type: string
          description: New label; omit to leave unchanged
        annotation:
          type: string
          description: New annotation text; omit to leave unchanged

    LichessResult:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: Lichess analysis URL
