openapi: 3.1.0
info:
  title: Chess Annotator API
  version: 0.3.0
  summary: Draft API for importing, annotating, reviewing, rendering, and exporting chess games.
  description: |
    Draft API derived from `docs/design.md`, the use-case documents, and the
    current application-service layer.

    Current implementation-aligned notes:
    - Games are addressed by author-supplied `game_id`.
    - Sessions are represented by the presence of `.work` files.
    - Segment identifiers are turning-point plies.
    - Rendering and Lichess upload use the working state when a session is open,
      otherwise the main saved state.
servers:
  - url: http://localhost:8000
    description: Local development server
tags:
  - name: Games
  - name: Sessions
  - name: Turning Points
  - name: Segments
  - name: Output
paths:
  /games:
    get:
      tags: [Games]
      summary: List games
      operationId: listGames
      responses:
        '200':
          description: Games currently present in the store
          content:
            application/json:
              schema:
                type: object
                required: [games]
                properties:
                  games:
                    type: array
                    items:
                      $ref: '#/components/schemas/GameSummary'
    post:
      tags: [Games]
      summary: Import a new game
      operationId: importGame
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportGameRequest'
          multipart/form-data:
            schema:
              type: object
              required: [game_id, pgn_file, player_side]
              properties:
                game_id:
                  $ref: '#/components/schemas/GameId'
                pgn_file:
                  type: string
                  format: binary
                player_side:
                  type: string
                  enum: [white, black]
                author:
                  type: string
                date:
                  type: string
                diagram_orientation:
                  type: string
                  enum: [white, black]
                game_index:
                  type: integer
                  minimum: 0
                overwrite:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Game imported and session opened
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameState'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}:
    parameters:
      - $ref: '#/components/parameters/GameIdPath'
    get:
      tags: [Games]
      summary: Get current game state
      operationId: getGame
      responses:
        '200':
          description: Saved game state and session summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameState'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Games]
      summary: Delete a game
      operationId: deleteGame
      parameters:
        - name: confirm
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '204':
          description: Game deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /games/{gameId}/copy:
    post:
      tags: [Games]
      summary: Save game as a new game id
      operationId: copyGame
      parameters:
        - $ref: '#/components/parameters/GameIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CopyGameRequest'
      responses:
        '201':
          description: New game created from the source game's current state
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}/session:
    parameters:
      - $ref: '#/components/parameters/GameIdPath'
    put:
      tags: [Sessions]
      summary: Open or resume a session
      operationId: openSession
      responses:
        '200':
          description: Session opened or resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameState'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Sessions]
      summary: Close a session
      operationId: closeSession
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseSessionRequest'
      responses:
        '200':
          description: Session closed or confirmation required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloseSessionResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}/session/save:
    post:
      tags: [Sessions]
      summary: Save working files to main files
      operationId: saveSession
      parameters:
        - $ref: '#/components/parameters/GameIdPath'
      responses:
        '200':
          description: Working files committed to main files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameState'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}/segments:
    get:
      tags: [Segments]
      summary: List segments for the open session
      operationId: listSegments
      parameters:
        - $ref: '#/components/parameters/GameIdPath'
      responses:
        '200':
          description: Segments derived from the working game state
          content:
            application/json:
              schema:
                type: object
                required: [segments]
                properties:
                  segments:
                    type: array
                    items:
                      $ref: '#/components/schemas/SegmentSummary'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}/segments/{turningPointPly}:
    parameters:
      - $ref: '#/components/parameters/GameIdPath'
      - $ref: '#/components/parameters/TurningPointPlyPath'
    get:
      tags: [Segments]
      summary: View a single segment
      operationId: getSegment
      responses:
        '200':
          description: Detailed segment view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SegmentDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    patch:
      tags: [Segments]
      summary: Update segment fields
      operationId: updateSegment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSegmentRequest'
      responses:
        '200':
          description: Segment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SegmentDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}/turning-points:
    post:
      tags: [Turning Points]
      summary: Add a turning point
      operationId: addTurningPoint
      parameters:
        - $ref: '#/components/parameters/GameIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTurningPointRequest'
      responses:
        '200':
          description: Updated segment list after the split
          content:
            application/json:
              schema:
                type: object
                required: [segments]
                properties:
                  segments:
                    type: array
                    items:
                      $ref: '#/components/schemas/SegmentSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}/turning-points/{ply}:
    delete:
      tags: [Turning Points]
      summary: Remove a turning point
      operationId: removeTurningPoint
      parameters:
        - $ref: '#/components/parameters/GameIdPath'
        - $ref: '#/components/parameters/PlyPath'
        - name: force
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Updated segment list after the merge
          content:
            application/json:
              schema:
                type: object
                required: [segments]
                properties:
                  segments:
                    type: array
                    items:
                      $ref: '#/components/schemas/SegmentSummary'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}/output/pdf:
    post:
      tags: [Output]
      summary: Render annotation to PDF
      operationId: renderPdf
      parameters:
        - $ref: '#/components/parameters/GameIdPath'
        - name: diagram_size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: page_size
          in: query
          required: false
          schema:
            type: string
            enum: [a4, letter]
      responses:
        '200':
          description: PDF rendered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenderPdfResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}/output/lichess:
    post:
      tags: [Output]
      summary: Upload annotated PGN to Lichess
      operationId: uploadToLichess
      parameters:
        - $ref: '#/components/parameters/GameIdPath'
      responses:
        '200':
          description: Upload successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LichessUploadResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'

components:
  parameters:
    GameIdPath:
      name: gameId
      in: path
      required: true
      description: Author-supplied game identifier
      schema:
        $ref: '#/components/schemas/GameId'
    PlyPath:
      name: ply
      in: path
      required: true
      description: Ply number
      schema:
        type: integer
        minimum: 1
    TurningPointPlyPath:
      name: turningPointPly
      in: path
      required: true
      description: Ply number that identifies the segment's turning point
      schema:
        type: integer
        minimum: 1

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested game or segment was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Request conflicts with the current game or session state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadGateway:
      description: Upstream Lichess upload failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    GameId:
      type: string
      minLength: 1
      description: Directory name for a stored game

    ImportGameRequest:
      type: object
      required: [game_id, player_side]
      properties:
        game_id:
          $ref: '#/components/schemas/GameId'
        pgn_text:
          type: string
          minLength: 1
        pgn_path:
          type: string
          minLength: 1
        player_side:
          type: string
          enum: [white, black]
        author:
          type: string
        date:
          type: string
        diagram_orientation:
          type: string
          enum: [white, black]
        game_index:
          type: integer
          minimum: 0
        overwrite:
          type: boolean
          default: false
      oneOf:
        - required: [pgn_text]
        - required: [pgn_path]

    CopyGameRequest:
      type: object
      required: [new_game_id]
      properties:
        new_game_id:
          $ref: '#/components/schemas/GameId'
        overwrite:
          type: boolean
          default: false

    AddTurningPointRequest:
      type: object
      required: [ply]
      properties:
        ply:
          type: integer
          minimum: 1
        label:
          type: string

    UpdateSegmentRequest:
      type: object
      minProperties: 1
      properties:
        label:
          type: string
          minLength: 1
        annotation:
          type: string
          minLength: 1
        show_diagram:
          type: boolean
      additionalProperties: false

    CloseSessionRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [save, discard]
          description: |
            Omit the body to let the server report that confirmation is required.
      additionalProperties: false

    GameSummary:
      type: object
      required:
        - game_id
        - title
        - white
        - black
        - event
        - date
        - result
        - in_progress
      properties:
        game_id:
          $ref: '#/components/schemas/GameId'
        title:
          type: string
        white:
          type: string
        black:
          type: string
        event:
          type: string
        date:
          type: string
        result:
          type: string
        in_progress:
          type: boolean

    GameState:
      type: object
      required:
        - game_id
        - title
        - session_open
        - has_unsaved_changes
        - segments
        - resumed
      properties:
        game_id:
          $ref: '#/components/schemas/GameId'
        title:
          type: string
        session_open:
          type: boolean
        has_unsaved_changes:
          type: boolean
        resumed:
          type: boolean
        segments:
          type: array
          items:
            $ref: '#/components/schemas/SegmentSummary'

    SegmentSummary:
      type: object
      required:
        - turning_point_ply
        - start_ply
        - end_ply
        - move_range
        - label
        - has_annotation
        - show_diagram
      properties:
        turning_point_ply:
          type: integer
          minimum: 1
        start_ply:
          type: integer
          minimum: 1
        end_ply:
          type: integer
          minimum: 1
        move_range:
          type: string
          description: Human-readable move span such as `1w-10b`.
        label:
          type: string
        has_annotation:
          type: boolean
        show_diagram:
          type: boolean

    SegmentDetail:
      type: object
      required:
        - turning_point_ply
        - start_ply
        - end_ply
        - move_range
        - label
        - annotation
        - move_list
        - show_diagram
      properties:
        turning_point_ply:
          type: integer
          minimum: 1
        start_ply:
          type: integer
          minimum: 1
        end_ply:
          type: integer
          minimum: 1
        move_range:
          type: string
        label:
          type: string
        annotation:
          type: string
        move_list:
          type: string
        show_diagram:
          type: boolean
        diagram_path:
          type: string
          description: Server-side preview path when diagram preview generation is enabled.

    CloseSessionResult:
      type: object
      required:
        - game_id
        - closed
        - requires_confirmation
        - saved
        - discarded
      properties:
        game_id:
          $ref: '#/components/schemas/GameId'
        closed:
          type: boolean
        requires_confirmation:
          type: boolean
        saved:
          type: boolean
        discarded:
          type: boolean

    RenderPdfResult:
      type: object
      required: [pdf_path]
      properties:
        pdf_path:
          type: string
          description: Server-side path to `<store_root>/<game_id>/output.pdf`.

    LichessUploadResult:
      type: object
      required: [analysis_url]
      properties:
        analysis_url:
          type: string
          format: uri

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
