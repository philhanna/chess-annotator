openapi: 3.1.0
info:
  title: Chess Annotator API
  version: 0.2.0
  summary: REST API for importing, annotating, reviewing, rendering, and exporting chess games.
  description: |
    Draft OpenAPI specification derived from `docs/design.md` and the
    sixteen use case documents in `docs/use-cases/`.

    This draft intentionally models the API around the use cases:
    - `games` covers import, listing, copy, metadata lookup, and deletion.
    - `session` covers open/resume, save, and close.
    - `segments` are addressed by their turning-point ply, which matches the
      persistence model in `annotation.json`.
    - Output actions remain explicit subresources because PDF rendering and
      Lichess upload are side-effectful operations rather than durable domain
      objects.

    Assumptions captured in this draft:
    - Import accepts either uploaded PGN content or a server-local file path so
      it can support both browser and CLI clients.
    - Alternate flows that ask the user to confirm overwrite or choose one game
      from a multi-game PGN are represented by explicit request fields instead
      of an interactive challenge protocol.
    - A game can be rendered or uploaded whether or not a session is currently
      open; if a session is open, the working state is used.
servers:
  - url: http://localhost:8000
    description: Local development server
tags:
  - name: Games
  - name: Sessions
  - name: Turning Points
  - name: Segments
  - name: Output
paths:
  /games:
    get:
      tags: [Games]
      summary: List games
      operationId: listGames
      responses:
        '200':
          description: Games currently present in the store
          content:
            application/json:
              schema:
                type: object
                required: [games]
                properties:
                  games:
                    type: array
                    items:
                      $ref: '#/components/schemas/GameSummary'
    post:
      tags: [Games]
      summary: Import a new game
      description: |
        Imports a PGN, strips all comments and NAGs, creates the main
        `annotated.pgn` and `annotation.json`, and opens a session for the new
        game.
      operationId: importGame
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportGameRequest'
          multipart/form-data:
            schema:
              type: object
              required: [game_id, pgn_file]
              properties:
                game_id:
                  $ref: '#/components/schemas/GameId'
                pgn_file:
                  type: string
                  format: binary
                game_index:
                  type: integer
                  minimum: 0
                  description: Zero-based game selection when the PGN contains multiple games.
                overwrite:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Game imported and session opened
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameState'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}:
    parameters:
      - $ref: '#/components/parameters/GameIdPath'
    get:
      tags: [Games]
      summary: Get game metadata and session summary
      operationId: getGame
      responses:
        '200':
          description: Game metadata plus current session status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameState'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Games]
      summary: Delete a game
      description: |
        Deletes the game directory and all files within it. Clients that want a
        two-step confirmation flow can first retrieve the game metadata with
        `GET /games/{gameId}` and then call delete with `confirm=true`.
      operationId: deleteGame
      parameters:
        - name: confirm
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '204':
          description: Game deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}/copy:
    post:
      tags: [Games]
      summary: Save game as a new game id
      operationId: copyGame
      parameters:
        - $ref: '#/components/parameters/GameIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CopyGameRequest'
      responses:
        '201':
          description: New game created from the source game's current state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameState'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}/session:
    parameters:
      - $ref: '#/components/parameters/GameIdPath'
    put:
      tags: [Sessions]
      summary: Open or resume a session
      operationId: openSession
      responses:
        '200':
          description: Session opened or resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameState'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Sessions]
      summary: Close a session
      description: |
        If the working files differ from the main files, the client must choose
        whether to save or discard those changes. If there are no unsaved
        changes, the request body may be omitted.
      operationId: closeSession
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseSessionRequest'
      responses:
        '200':
          description: Session closed or left open after cancel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloseSessionResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}/session/save:
    post:
      tags: [Sessions]
      summary: Save working files to main files
      operationId: saveSession
      parameters:
        - $ref: '#/components/parameters/GameIdPath'
      responses:
        '200':
          description: Working files committed to main files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveSessionResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}/segments:
    get:
      tags: [Segments]
      summary: List segments for the open session
      operationId: listSegments
      parameters:
        - $ref: '#/components/parameters/GameIdPath'
      responses:
        '200':
          description: Segments derived from the working annotated PGN
          content:
            application/json:
              schema:
                type: object
                required: [segments]
                properties:
                  segments:
                    type: array
                    items:
                      $ref: '#/components/schemas/SegmentSummary'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}/segments/{turningPointPly}:
    parameters:
      - $ref: '#/components/parameters/GameIdPath'
      - $ref: '#/components/parameters/TurningPointPlyPath'
    get:
      tags: [Segments]
      summary: View a single segment
      operationId: getSegment
      responses:
        '200':
          description: Detailed segment view for the working game state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SegmentDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    patch:
      tags: [Segments]
      summary: Update segment fields
      description: |
        Supports the use cases for setting a label, setting annotation text, and
        toggling the diagram flag. Clients should send only the field or fields
        they intend to change.
      operationId: updateSegment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSegmentRequest'
      responses:
        '200':
          description: Segment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SegmentDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}/turning-points:
    post:
      tags: [Turning Points]
      summary: Add a turning point
      operationId: addTurningPoint
      parameters:
        - $ref: '#/components/parameters/GameIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTurningPointRequest'
      responses:
        '200':
          description: Updated segment list after the split
          content:
            application/json:
              schema:
                type: object
                required: [segments]
                properties:
                  segments:
                    type: array
                    items:
                      $ref: '#/components/schemas/SegmentSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}/turning-points/{ply}:
    delete:
      tags: [Turning Points]
      summary: Remove a turning point
      operationId: removeTurningPoint
      parameters:
        - $ref: '#/components/parameters/GameIdPath'
        - $ref: '#/components/parameters/PlyPath'
      responses:
        '200':
          description: Updated segment list after the merge
          content:
            application/json:
              schema:
                type: object
                required: [segments]
                properties:
                  segments:
                    type: array
                    items:
                      $ref: '#/components/schemas/SegmentSummary'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}/output/pdf:
    post:
      tags: [Output]
      summary: Render annotation to PDF
      operationId: renderPdf
      parameters:
        - $ref: '#/components/parameters/GameIdPath'
      responses:
        '200':
          description: PDF rendered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenderPdfResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}/output/lichess:
    post:
      tags: [Output]
      summary: Upload annotated PGN to Lichess
      operationId: uploadToLichess
      parameters:
        - $ref: '#/components/parameters/GameIdPath'
      responses:
        '200':
          description: Upload successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LichessUploadResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'

components:
  parameters:
    GameIdPath:
      name: gameId
      in: path
      required: true
      description: Author-supplied game identifier
      schema:
        $ref: '#/components/schemas/GameId'
    PlyPath:
      name: ply
      in: path
      required: true
      description: Ply number
      schema:
        type: integer
        minimum: 1
    TurningPointPlyPath:
      name: turningPointPly
      in: path
      required: true
      description: Ply number that identifies the segment's turning point
      schema:
        type: integer
        minimum: 1

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested game or segment was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Request conflicts with the current game or session state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadGateway:
      description: Upstream Lichess upload failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    GameId:
      type: string
      minLength: 1
      description: Directory name for a stored game

    ImportGameRequest:
      type: object
      required: [game_id]
      properties:
        game_id:
          $ref: '#/components/schemas/GameId'
        pgn_text:
          type: string
          minLength: 1
          description: Raw PGN content supplied directly by the client.
        pgn_path:
          type: string
          minLength: 1
          description: Server-local PGN file path for CLI-style clients.
        game_index:
          type: integer
          minimum: 0
          description: Zero-based game selection when the source contains multiple games.
        overwrite:
          type: boolean
          default: false
      oneOf:
        - required: [pgn_text]
        - required: [pgn_path]

    CopyGameRequest:
      type: object
      required: [new_game_id]
      properties:
        new_game_id:
          $ref: '#/components/schemas/GameId'
        overwrite:
          type: boolean
          default: false

    AddTurningPointRequest:
      type: object
      required: [ply]
      properties:
        ply:
          type: integer
          minimum: 1

    UpdateSegmentRequest:
      type: object
      minProperties: 1
      properties:
        label:
          type: string
          minLength: 1
        annotation:
          type: string
          minLength: 1
        show_diagram:
          type: boolean
      additionalProperties: false

    CloseSessionRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [save, discard, cancel]
          description: |
            Required when the session has unsaved changes. `cancel` leaves the
            session open and changes nothing.
      additionalProperties: false

    GameSummary:
      type: object
      required:
        - game_id
        - metadata
        - session_in_progress
      properties:
        game_id:
          $ref: '#/components/schemas/GameId'
        metadata:
          $ref: '#/components/schemas/GameMetadata'
        session_in_progress:
          type: boolean

    GameState:
      type: object
      required:
        - game_id
        - metadata
        - session
      properties:
        game_id:
          $ref: '#/components/schemas/GameId'
        metadata:
          $ref: '#/components/schemas/GameMetadata'
        session:
          $ref: '#/components/schemas/SessionStatus'
        segments:
          type: array
          items:
            $ref: '#/components/schemas/SegmentSummary'
          description: Present when the current session is open and segments are loaded.

    GameMetadata:
      type: object
      required: [white, black, event, date, result]
      properties:
        white:
          type: string
        black:
          type: string
        event:
          type: string
        site:
          type: string
        round:
          type: string
        date:
          type: string
        result:
          type: string

    SessionStatus:
      type: object
      required: [is_open, has_unsaved_changes]
      properties:
        is_open:
          type: boolean
        has_unsaved_changes:
          type: boolean
        resumed:
          type: boolean
          description: True when an existing `.work` session was resumed.

    SegmentSummary:
      type: object
      required:
        - turning_point_ply
        - start_ply
        - end_ply
        - move_range
        - has_label
        - has_annotation
        - show_diagram
      properties:
        turning_point_ply:
          type: integer
          minimum: 1
        start_ply:
          type: integer
          minimum: 1
        end_ply:
          type: integer
          minimum: 1
        move_range:
          type: string
          description: Human-readable move span such as `14-24`.
        label:
          type: string
          description: Current segment label, which may be empty while authoring.
        has_label:
          type: boolean
        has_annotation:
          type: boolean
        show_diagram:
          type: boolean

    SegmentDetail:
      allOf:
        - $ref: '#/components/schemas/SegmentSummary'
        - type: object
          required: [annotation, moves]
          properties:
            annotation:
              type: string
            moves:
              type: array
              items:
                $ref: '#/components/schemas/MoveEntry'
            diagram:
              $ref: '#/components/schemas/DiagramPreview'

    MoveEntry:
      type: object
      required: [ply, san]
      properties:
        ply:
          type: integer
          minimum: 1
        move_number:
          type: integer
          minimum: 1
        color:
          type: string
          enum: [white, black]
        san:
          type: string

    DiagramPreview:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
        format:
          type: string
          enum: [svg]
        svg:
          type: string
          description: SVG markup for the final board position of the segment.

    SaveSessionResult:
      type: object
      required: [saved, session_open]
      properties:
        saved:
          type: boolean
        session_open:
          type: boolean
        has_unsaved_changes:
          type: boolean

    CloseSessionResult:
      type: object
      required: [closed, session_open]
      properties:
        closed:
          type: boolean
        session_open:
          type: boolean
        saved:
          type: boolean
        discarded:
          type: boolean

    RenderPdfResult:
      type: object
      required: [pdf_path]
      properties:
        pdf_path:
          type: string
          description: Server-side path to the generated `output.pdf`.

    LichessUploadResult:
      type: object
      required: [analysis_url]
      properties:
        analysis_url:
          type: string
          format: uri

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
