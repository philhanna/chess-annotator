[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "chess-annotator"
version = "0.3.0"
description = "Tool for annotating chess games and rendering them as book-quality PDFs"
requires-python = ">=3.11"
dependencies = [
    "python-chess",
    "weasyprint",
    "mistune",
    "pyyaml",
]

[project.optional-dependencies]
dev = ["pytest"]

[project.scripts]
chess-annotate = "annotate.cli.annotate:main"
chess-render   = "annotate.cli.render:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
annotate = ["adapters/chess_book.css"]
