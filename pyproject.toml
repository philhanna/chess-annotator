[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "chess-plan"
version = "0.1.0"
description = "Simple CLI for plan-oriented chess game review"
requires-python = ">=3.11"
dependencies = [
  "python-chess",
]

[project.scripts]
chessplan = "chessplan.adapters.cli:main"
chessbook = "chessbook:main"
