# Chess Annotator sample configuration
# Linux/macOS: ~/.config/chess-annotator/config.yaml
# Windows: %APPDATA%\chess-annotator\config.yaml

# Root directory that stores one folder per game-id.
# Each game folder contains annotated.pgn, annotation.json,
# optional .work files, output.pdf, and diagram-cache/.
# store_dir: /path/to/chess-annotator-store

# Prefilled during import.
author: Phil Hanna

# Default board size for PDF rendering and segment previews.
diagram_size: 300

# Default page size for PDF output.
# Allowed values: a4, letter
page_size: letter
